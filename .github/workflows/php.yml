name: PHP lint & test

concurrency: ${{ github.workflow }}
on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      max-parallel: 2
      matrix:
        include:
          - php: '7.2'
            token: UNIVAPAY_PHP_TEST_TOKEN_7_2
            secret: UNIVAPAY_PHP_TEST_SECRET_7_2
          - php: '7.4'
            token: UNIVAPAY_PHP_TEST_TOKEN_7_4
            secret: UNIVAPAY_PHP_TEST_SECRET_7_4
          - php: '8.0'
            token: UNIVAPAY_PHP_TEST_TOKEN_8_0
            secret: UNIVAPAY_PHP_TEST_SECRET_8_0
          - php: '8.1'
            token: UNIVAPAY_PHP_TEST_TOKEN_8_1
            secret: UNIVAPAY_PHP_TEST_SECRET_8_1
          - php: '8.2'
            token: UNIVAPAY_PHP_TEST_TOKEN_8_2
            secret: UNIVAPAY_PHP_TEST_SECRET_8_2
          - php: '8.3'
            token: UNIVAPAY_PHP_TEST_TOKEN_8_3
            secret: UNIVAPAY_PHP_TEST_SECRET_8_3
          - php: '8.4'
            token: UNIVAPAY_PHP_TEST_TOKEN_8_4
            secret: UNIVAPAY_PHP_TEST_SECRET_8_4
          - php: '8.5'
            token: UNIVAPAY_PHP_TEST_TOKEN_8_5
            secret: UNIVAPAY_PHP_TEST_SECRET_8_5
          

    steps:
    - uses: actions/checkout@v4
      
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}

    - name: Get composer cache directory
      id: composer-cache
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
    
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('**/composer.json') }}
        restore-keys: ${{ runner.os }}-composer-${{ matrix.php }}-
    
    - name: Install dependencies
      run: composer install --prefer-dist --no-progress -n

    - name: PHP Lint
      run: composer lint

    - name: Set ENV
      run: |
        echo "UNIVAPAY_PHP_TEST_SECRET=${{ secrets[matrix.secret] }}" >> $GITHUB_ENV
        echo "UNIVAPAY_PHP_TEST_TOKEN=${{ secrets[matrix.token] }}" >> $GITHUB_ENV
      
    - name: PHP Unit Tests
      run: composer test
      env:
        UNIVAPAY_PHP_TEST_ENDPOINT: https://api.gyro-n.money
        UNIVAPAY_PHP_TEST_SECRET: ${{ env.UNIVAPAY_PHP_TEST_SECRET }}
        UNIVAPAY_PHP_TEST_TOKEN: ${{ env.UNIVAPAY_PHP_TEST_TOKEN }}
